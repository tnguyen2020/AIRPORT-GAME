<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>✈️ Security Officer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      color: white;
      display: flex;
      flex-direction: column;
    }
    header {
      background: rgba(255,255,255,0.07);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .role-tag {
      background: #ef4444;
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 12px;
      letter-spacing: 0.5px;
    }
    .instruction {
      margin: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.5;
      text-align: center;
      font-weight: 500;
      transition: all 0.4s;
    }
    .instruction.waiting { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7); }
    .instruction.action  { background: rgba(245,158,11,0.2); border: 1px solid #f59e0b; color: #fde68a; }
    .instruction.success { background: rgba(52,211,153,0.15); border: 1px solid #34d399; color: #6ee7b7; }
    .instruction.danger  { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; color: #fca5a5;
                           animation: dangerPulse 0.5s infinite alternate; }
    @keyframes dangerPulse {
      from { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
      to   { box-shadow: 0 0 0 12px rgba(239,68,68,0); }
    }

    .section-title {
      padding: 6px 16px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.4;
    }

    /* Scanner visual */
    .scanner-visual {
      margin: 0 14px 14px;
      background: rgba(0,0,0,0.3);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      display: none;
    }
    .scanner-visual.show { display: block; }
    .scanner-gate {
      font-size: 3rem;
      margin: 10px 0;
      position: relative;
    }
    .scanner-beam {
      height: 4px;
      background: linear-gradient(90deg, transparent, #60d0f5, transparent);
      border-radius: 2px;
      margin: 8px 0;
      animation: beam 1s infinite;
    }
    @keyframes beam {
      0%   { opacity: 0.3; }
      50%  { opacity: 1; }
      100% { opacity: 0.3; }
    }
    .beep-alert {
      background: rgba(239,68,68,0.2);
      border: 2px solid #ef4444;
      border-radius: 14px;
      padding: 16px;
      margin-top: 12px;
      display: none;
    }
    .beep-alert.show { display: block; }
    .beep-text {
      font-size: 1.5rem;
      font-weight: 900;
      color: #fca5a5;
      animation: beepFlash 0.3s infinite alternate;
    }
    @keyframes beepFlash { from { opacity: 1; } to { opacity: 0.3; } }

    /* Tray items display */
    .tray-display {
      margin: 0 14px 14px;
      background: rgba(255,255,255,0.05);
      border: 2px dashed rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 14px;
      min-height: 80px;
      display: none;
    }
    .tray-display.show { display: block; }
    .tray-display h4 { font-size: 0.8rem; opacity: 0.5; margin-bottom: 10px; }
    .tray-items {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tray-item {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .tray-item.flagged {
      background: rgba(239,68,68,0.2);
      border: 1px solid #ef4444;
    }

    /* Action buttons */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 6px 14px 14px;
    }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.15s;
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: left;
      width: 100%;
    }
    .action-btn:active:not(:disabled) { transform: scale(0.96); }
    .action-btn.available {
      border-color: #f59e0b;
      background: rgba(245,158,11,0.15);
      animation: btnPulse 1.5s infinite alternate;
    }
    .action-btn.danger-btn {
      border-color: #ef4444;
      background: rgba(239,68,68,0.15);
    }
    @keyframes btnPulse {
      from { box-shadow: 0 0 0 0 rgba(245,158,11,0.4); }
      to   { box-shadow: 0 0 0 8px rgba(245,158,11,0); }
    }
    .action-btn.done {
      opacity: 0.3;
      cursor: not-allowed;
      border-color: transparent;
    }
    .action-btn:disabled { cursor: not-allowed; }
    .btn-emoji { font-size: 1.8rem; }
    .btn-text { flex: 1; }
    .btn-sublabel { font-size: 0.72rem; opacity: 0.5; font-weight: 400; margin-top: 2px; }

    /* Confiscate panel */
    .confiscate-panel {
      display: none;
      margin: 0 14px 14px;
      background: rgba(239,68,68,0.1);
      border: 2px solid #ef4444;
      border-radius: 18px;
      padding: 16px;
    }
    .confiscate-panel.show { display: block; }
    .confiscate-panel h4 {
      color: #fca5a5;
      margin-bottom: 12px;
      font-size: 0.9rem;
      text-align: center;
    }
    .confiscate-items {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .confiscate-btn {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(239,68,68,0.4);
      background: rgba(239,68,68,0.15);
      color: #fca5a5;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
    }
    .confiscate-btn:active { transform: scale(0.96); }

    /* Waiting screen */
    .waiting-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0.6;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(239,68,68,0.9);
      color: white; padding: 12px 22px;
      border-radius: 12px; font-size: 0.88rem;
      font-weight: 600; transition: transform 0.3s; z-index: 999;
      text-align: center; max-width: 300px;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.green { background: rgba(52,211,153,0.9); }
  </style>
</head>
<body>

<header>
  <div class="role-tag">👮 SECURITY OFFICER</div>
  <h2 id="player-name">Officer</h2>
</header>

<div class="instruction waiting" id="instruction">
  🔒 Waiting for passenger to arrive at security...
</div>

<!-- Scanner Visual -->
<div class="scanner-visual" id="scanner-visual">
  <div style="font-size:0.8rem;opacity:0.5;margin-bottom:8px">SECURITY SCANNER</div>
  <div class="scanner-gate">🚪</div>
  <div class="scanner-beam"></div>
  <div id="scan-status" style="font-size:0.85rem;opacity:0.7">Ready to scan</div>
  <div class="beep-alert" id="beep-alert">
    <div class="beep-text">🚨 BEEP BEEP BEEP! 🚨</div>
    <div id="beep-detail" style="font-size:0.85rem;margin-top:8px;color:#fca5a5"></div>
  </div>
</div>

<!-- Tray Display -->
<div class="tray-display" id="tray-display">
  <h4>📦 ITEMS IN TRAY:</h4>
  <div class="tray-items" id="tray-items"></div>
</div>

<!-- Confiscate Panel -->
<div class="confiscate-panel" id="confiscate-panel">
  <h4>🚫 Prohibited Items Found!</h4>
  <div class="confiscate-items" id="confiscate-items"></div>
</div>

<!-- Waiting screen -->
<div class="waiting-screen" id="waiting-screen">
  <div style="font-size:4rem">⏳</div>
  <p>Waiting for passenger to arrive...</p>
</div>

<!-- Main actions -->
<div id="main-actions" style="display:none;flex-direction:column;flex:1;">

  <p class="section-title">Security Actions</p>

  <div class="actions">

    <button class="action-btn available" id="btn-tray" 
            onclick="securityAction('request_tray')">
      <span class="btn-emoji">📦</span>
      <div class="btn-text">
        Request Tray Items
        <div class="btn-sublabel">
          "Please place all items in the tray"
        </div>
      </div>
    </button>

    <button class="action-btn" id="btn-laptop-tray" 
            onclick="securityAction('request_laptop_tray')" disabled>
      <span class="btn-emoji">💻</span>
      <div class="btn-text">
        Separate Laptop Tray
        <div class="btn-sublabel">
          "Please put your laptop in a separate tray"
        </div>
      </div>
    </button>

    <button class="action-btn" id="btn-scan" 
            onclick="startScan()" disabled>
      <span class="btn-emoji">🚶</span>
      <div class="btn-text">
        Start Scanning
        <div class="btn-sublabel">
          "Please walk through the scanner"
        </div>
      </div>
    </button>

    <button class="action-btn" id="btn-wand" 
            onclick="securityAction('wand_check')" 
            style="display:none">
      <span class="btn-emoji">🔍</span>
      <div class="btn-text">
        Use Hand Scanner (Wand)
        <div class="btn-sublabel">
          "Please raise your arms"
        </div>
      </div>
    </button>

    <button class="action-btn" id="btn-clear" 
            onclick="clearPassenger()" 
            style="display:none">
      <span class="btn-emoji">✅</span>
      <div class="btn-text">
        Clear Passenger
        <div class="btn-sublabel">
          "You're all clear! Have a safe flight!"
        </div>
      </div>
    </button>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  const name = sessionStorage.getItem("playerName") || "Officer";
  document.getElementById("player-name").textContent = name;

  let securityState = {};
  let phase = "waiting";
  let trayItems = [];
  let flaggedItems = [];
  let scanning = false;

  socket.emit("join_player", {
    name,
    savedRole: sessionStorage.getItem("playerRole")
  });

  socket.on("joined", (data) => {
    if (data.role !== "security") {
      window.location.href = "/passenger.html";
    }
    sessionStorage.setItem("playerRole", "security");
  });

  socket.on("state_update", (state) => {
    securityState = state.securityState || {};
    phase = state.phase || "waiting";
    updateUI();
  });

  socket.on("item_in_tray", ({ itemKey, item }) => {
    trayItems.push({ key: itemKey, ...item });
    updateTrayDisplay();

    // Check if flagged item
    if (item.category === "flagged") {
      flaggedItems.push({ key: itemKey, ...item });
      showFlaggedItem(itemKey, item);
    }

    // Unlock laptop tray if laptop added
    if (itemKey === "laptop") {
      document.getElementById("btn-laptop-tray").className = "action-btn available";
      document.getElementById("btn-laptop-tray").disabled = false;
    }

    // After enough items, unlock scan button
    const nonFlaggedInTray = trayItems.filter(i => i.category !== "flagged");
    if (nonFlaggedInTray.length >= 2) {
      document.getElementById("btn-scan").className = "action-btn available";
      document.getElementById("btn-scan").disabled = false;
    }
  });

  socket.on("scanner_beep", ({ reasons }) => {
    scanning = false;
    document.getElementById("scan-status").textContent = "🚨 ALERT!";
    document.getElementById("beep-alert").classList.add("show");
    document.getElementById("beep-detail").textContent =
      `Detected: ${reasons.map(r => r.toUpperCase()).join(", ")}`;

    document.getElementById("instruction").className = "instruction danger";
    document.getElementById("instruction").textContent =
      `🚨 BEEP! Something triggered the scanner! Use the wand to check!`;

    document.getElementById("btn-wand").style.display = "flex";
    document.getElementById("btn-scan").className = "action-btn done";
    document.getElementById("btn-scan").disabled = true;

    showToast("🚨 BEEP! Passenger triggered scanner!", "red");
  });

  socket.on("scanner_clear", () => {
    scanning = false;
    document.getElementById("scan-status").textContent = "✅ ALL CLEAR";
    document.getElementById("instruction").className = "instruction success";
    document.getElementById("instruction").textContent =
      "✅ All clear! Passenger may proceed to the gate!";
    document.getElementById("btn-clear").style.display = "flex";
    showToast("✅ All clear! Great job!", "green");
  });

  socket.on("wand_found", ({ items }) => {
    showToast(`🔍 Found: ${items.join(", ")}`, "red");
    document.getElementById("btn-wand").className = "action-btn done";
    document.getElementById("btn-wand").disabled = true;
    document.getElementById("instruction").textContent =
      `Found ${items.join(" and ")}! Ask passenger to remove and rescan!`;
  });

  socket.on("wand_clear", () => {
    document.getElementById("instruction").className = "instruction success";
    document.getElementById("instruction").textContent =
      "✅ Wand check clear! Passenger may proceed!";
    document.getElementById("btn-clear").style.display = "flex";
  });

  socket.on("game_reset", () => window.location.reload());

  function securityAction(action, data = {}) {
    socket.emit("security_action", { action, data });
  }

  function startScan() {
    scanning = true;
    document.getElementById("scanner-visual").classList.add("show");
    document.getElementById("scan-status").textContent = "⏳ Scanning...";
    document.getElementById("btn-scan").className = "action-btn done";
    document.getElementById("btn-scan").disabled = true;
    showToast("⏳ Scanning passenger...", "green");
    securityAction("start_scan");
  }

  function clearPassenger() {
    securityAction("clear_passenger");
    document.getElementById("instruction").className = "instruction success";
    document.getElementById("instruction").textContent =
      "🎉 Security complete! Have a great flight!";
    document.getElementById("btn-clear").style.display = "none";
    showToast("✅ Passenger cleared!", "green");
  }

  function showFlaggedItem(key, item) {
    const panel = document.getElementById("confiscate-panel");
    const itemsDiv = document.getElementById("confiscate-items");
    panel.classList.add("show");
    const btn = document.createElement("button");
    btn.className = "confiscate-btn";
    btn.innerHTML = `
      ${item.emoji} ${item.label}<br>
      <span style="font-size:0.75rem;opacity:0.7">
        ⚠️ ${item.flagReason}
      </span><br>
      <span style="font-size:0.75rem;color:#ef4444">
        Tap to confiscate
      </span>
    `;
    btn.onclick = () => {
      securityAction("confiscate_item", { itemKey: key });
      btn.style.opacity = "0.3";
      btn.disabled = true;
      btn.innerHTML = `✅ ${item.emoji} ${item.label} confiscated`;
    };
    itemsDiv.appendChild(btn);
    showToast(`⚠️ ${item.label} found! ${item.flagReason}`, "red");
  }

  function updateTrayDisplay() {
    const display = document.getElementById("tray-display");
    const itemsDiv = document.getElementById("tray-items");
    display.classList.add("show");
    itemsDiv.innerHTML = "";
    trayItems.forEach(item => {
      const div = document.createElement("div");
      div.className = "tray-item" + (item.category === "flagged" ? " flagged" : "");
      div.textContent = `${item.emoji} ${item.label}`;
      itemsDiv.appendChild(div);
    });
  }

  function updateUI() {
    if (phase === "waiting") {
      document.getElementById("waiting-screen").style.display = "flex";
      document.getElementById("main-actions").style.display = "none";
    } else {
      document.getElementById("waiting-screen").style.display = "none";
      document.getElementById("main-actions").style.display = "flex";
    }
  }

  function showToast(msg, type = "red") {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.className = "toast show" + (type === "green" ? " green" : "");
    setTimeout(() => {
      toast.className = "toast" + (type === "green" ? " green" : "");
    }, 3000);
  }
</script>
</body>
</html>
