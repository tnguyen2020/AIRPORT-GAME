<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>✈️ Join Airport Game</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Segoe UI',sans-serif;
      background:linear-gradient(160deg,#0f2027,#203a43,#2c5364);
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;color:white;padding:24px;
    }
    .scenario-badge{
      padding:8px 16px;border-radius:12px;
      border:1px solid rgba(255,255,255,0.2);
      font-size:0.85rem;margin-bottom:20px;text-align:center;
    }
    .card{
      background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
      border-radius:24px;padding:36px 28px;width:100%;max-width:380px;
      text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.4);
    }
    .logo{font-size:4rem;margin-bottom:12px}
    h1{font-size:1.6rem;margin-bottom:6px}
    p{opacity:0.6;font-size:0.9rem;margin-bottom:28px}
    input{
      width:100%;padding:14px 18px;border-radius:12px;
      border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);
      color:white;font-size:1.1rem;margin-bottom:16px;outline:none;
      transition:border-color 0.2s;
    }
    input::placeholder{color:rgba(255,255,255,0.4)}
    input:focus{border-color:#60d0f5}
    button{
      width:100%;padding:14px;border-radius:12px;border:none;
      background:#f59e0b;color:#1a1a2e;font-size:1.1rem;
      font-weight:700;cursor:pointer;transition:transform 0.1s,opacity 0.2s;
    }
    button:active{transform:scale(0.97)}
    button:disabled{opacity:0.5;cursor:not-allowed}
    .error-msg{margin-top:14px;color:#fca5a5;font-size:0.9rem}
    .spinner{
      display:inline-block;width:24px;height:24px;
      border:3px solid rgba(255,255,255,0.2);border-top-color:#60d0f5;
      border-radius:50%;animation:spin 0.8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Role available cards */
    .role-available{
      display:flex;flex-direction:column;gap:10px;margin-bottom:20px;
    }
    .role-pick{
      display:flex;align-items:center;gap:12px;
      padding:14px 16px;border-radius:16px;
      border:2px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.07);cursor:pointer;
      transition:all 0.2s;text-align:left;color:white;
      font-size:0.95rem;font-weight:600;width:100%;
    }
    .role-pick:hover{transform:scale(1.02)}
    .role-pick.taken{opacity:0.3;cursor:not-allowed;pointer-events:none}
    .role-pick .role-emoji{font-size:2rem}
  </style>
</head>
<body>

<div class="scenario-badge" id="scenario-badge">✈️ Airport Game</div>

<div class="card">
  <div class="logo">✈️</div>
  <h1>Airport Game</h1>
  <p id="card-subtitle">Enter your name to join!</p>

  <input id="name-input" type="text" placeholder="Your name"
         maxlength="20" autocomplete="off"/>

  <!-- Role picker (shown after name entered) -->
  <div class="role-available" id="role-picker" style="display:none"></div>

  <button id="join-btn" onclick="showRolePicker()">🚀 Continue</button>
  <p id="error-msg" class="error-msg"></p>
</div>

<script src="game.js"></script>
<script>

  // ── Auto-detect correct URL ────────────────────────────
  // Fix: if loaded via IP, game.js localStorage works cross-tab
  // but phone needs same hostname as host screen

  // Update scenario badge
  function updateBadge() {
    try {
      const state = AirportGame.getState();
      const badge = document.getElementById("scenario-badge");
      if (state.scenario === "security") {
        badge.textContent = "🔒 Scenario: Security Check";
        badge.style.background = "rgba(239,68,68,0.2)";
        badge.style.borderColor = "#ef4444";
      } else {
        badge.textContent = "📋 Scenario: Check-in";
        badge.style.background = "rgba(245,158,11,0.2)";
        badge.style.borderColor = "#f59e0b";
      }
    } catch(e) {}
  }

  AirportGame.onChange(updateBadge);
  updateBadge();

  // ── Make button work on mobile ─────────────────────────
  const joinBtn  = document.getElementById("join-btn");
  const nameInput = document.getElementById("name-input");

  // Fix: use both onclick AND touchend for mobile
  joinBtn.addEventListener("click",     showRolePicker);
  joinBtn.addEventListener("touchend",  (e) => { 
    e.preventDefault(); 
    showRolePicker(); 
  });

  nameInput.addEventListener("keyup", (e) => {
    if (e.key === "Enter") showRolePicker();
  });

  function showRolePicker() {
    const name = nameInput.value.trim();
    if (!name) {
      document.getElementById("error-msg").textContent = 
        "⚠️ Please enter your name!";
      // Shake the input
      nameInput.style.borderColor = "#ef4444";
      setTimeout(() => nameInput.style.borderColor = "", 1000);
      return;
    }

    sessionStorage.setItem("playerName", name);
    document.getElementById("error-msg").textContent = "";

    // Show loading state
    joinBtn.disabled = true;
    joinBtn.textContent = "⏳ Loading...";

    try {
      const state  = AirportGame.getState();
      const takenRoles = Object.values(state.roles || {});
      const scenario   = state.scenario || "checkin";

      // Build roles based on scenario
      const allRoles = scenario === "security"
        ? [
            { key:"passenger", emoji:"🧳", label:"Passenger",
              sub:"Show your identity & items" },
            { key:"security",  emoji:"👮", label:"Security Officer",
              sub:"Scan & check passengers" },
          ]
        : [
            { key:"passenger", emoji:"🧳", label:"Passenger",
              sub:"Show your identity & luggage" },
            { key:"clerk",     emoji:"🧑‍💼", label:"Check-in Clerk",
              sub:"Process the passenger" },
          ];

      const picker = document.getElementById("role-picker");
      picker.innerHTML = "";
      picker.style.display = "flex";
      joinBtn.style.display = "none";
      document.getElementById("card-subtitle").textContent = "Choose your role:";

      allRoles.forEach(role => {
        const taken = takenRoles.includes(role.key);
        const btn   = document.createElement("button");
        btn.className = "role-pick" + (taken ? " taken" : "");
        btn.innerHTML = `
          <span class="role-emoji">${role.emoji}</span>
          <div style="flex:1;text-align:left">
            <div style="font-weight:700">
              ${role.label} ${taken ? '<span style="color:#34d399">✓ Taken</span>' : ""}
            </div>
            <div style="font-size:0.75rem;opacity:0.5;margin-top:2px">
              ${taken ? "This role is already filled" : role.sub}
            </div>
          </div>
          ${!taken ? '<span style="font-size:1.2rem">→</span>' : ""}
        `;

        if (!taken) {
          // Both click AND touch for mobile
          btn.addEventListener("click",    () => joinAsRole(role.key));
          btn.addEventListener("touchend", (e) => { 
            e.preventDefault(); 
            joinAsRole(role.key); 
          });
        }
        picker.appendChild(btn);
      });

    } catch(err) {
      console.error(err);
      document.getElementById("error-msg").textContent = 
        "❌ Error loading game state. Refresh and try again.";
      joinBtn.disabled = false;
      joinBtn.textContent = "🚀 Continue";
    }
  }

  function joinAsRole(role) {
    const name  = sessionStorage.getItem("playerName") || "Player";
    const tabId = AirportGame.getTabId();

    try {
      const state      = AirportGame.getState();
      const takenRoles = Object.values(state.roles || {});

      // Double-check not taken
      if (takenRoles.includes(role)) {
        document.getElementById("error-msg").textContent = 
          "❌ That role was just taken! Pick another.";
        return;
      }

      // Assign role
      state.roles[tabId] = role;

      if (role === "passenger") {
        state.passengers[tabId] = AirportGame.generatePassenger(name);
      }

      AirportGame.addLog(state, `✅ ${name} joined as ${role}`, "success");

      // Auto-start check
      const newRoles  = Object.values(state.roles);
      const scenario  = state.scenario || "checkin";
      const readyCI   = newRoles.includes("passenger") && newRoles.includes("clerk");
      const readySec  = newRoles.includes("passenger") && newRoles.includes("security");

      if ((scenario === "checkin"  && readyCI) ||
          (scenario === "security" && readySec)) {
        state.phase = scenario;
        AirportGame.addLog(state, `🎬 ${scenario} started!`, "success");
      }

      AirportGame.saveState(state);
      sessionStorage.setItem("playerRole", role);
      AirportGame.dispatch();

      // Show joining message
      document.getElementById("error-msg").style.color = "#34d399";
      document.getElementById("error-msg").textContent = 
        `✅ Joining as ${role}...`;

      // Redirect after short delay
      setTimeout(() => {
        window.location.href = `${role}.html`;
      }, 500);

    } catch(err) {
      console.error(err);
      document.getElementById("error-msg").textContent = 
        "❌ Error joining. Please refresh.";
    }
  }

</script>
</body>
</html>
