<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>✈️ Check-in Clerk</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      color: white;
      display: flex;
      flex-direction: column;
    }
    header {
      background: rgba(255,255,255,0.07);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .role-tag {
      background: #f59e0b;
      color: #1a1a2e;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 12px;
    }
    .instruction {
      margin: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.5;
      text-align: center;
      font-weight: 500;
    }
    .instruction.waiting { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7); }
    .instruction.action  { background: rgba(245,158,11,0.2); border: 1px solid #f59e0b; color: #fde68a; }
    .instruction.success { background: rgba(52,211,153,0.15); border: 1px solid #34d399; color: #6ee7b7; }

    .section-title {
      padding: 6px 16px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.4;
    }

    /* ── Spelling Input ── */
    .spelling-box {
      display: none;
      margin: 0 14px 14px;
      background: rgba(245,158,11,0.1);
      border: 2px solid #f59e0b;
      border-radius: 18px;
      padding: 16px;
    }
    .spelling-box.show { display: block; }
    .spelling-box h4 {
      font-size: 0.85rem;
      margin-bottom: 10px;
      text-align: center;
      color: #fde68a;
    }
    .spelling-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .spelling-input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      outline: none;
    }
    .spelling-input:focus { border-color: #f59e0b; }
    .spelling-submit {
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      background: #f59e0b;
      color: #1a1a2e;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .spelling-submit:active { transform: scale(0.95); }
    .spelling-feedback {
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }
    .spelling-feedback.correct { 
      display: block; 
      background: rgba(52,211,153,0.2); 
      color: #6ee7b7; 
      border: 1px solid #34d399;
    }
    .spelling-feedback.wrong { 
      display: block; 
      background: rgba(239,68,68,0.2); 
      color: #fca5a5; 
      border: 1px solid #ef4444;
    }

    /* ── Buttons ── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 6px 14px 14px;
    }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.15s;
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: left;
      width: 100%;
    }
    .action-btn:active:not(:disabled) { transform: scale(0.96); }
    .action-btn.available {
      border-color: #f59e0b;
      background: rgba(245,158,11,0.15);
      animation: btnPulse 1.5s infinite alternate;
    }
    @keyframes btnPulse {
      from { box-shadow: 0 0 0 0 rgba(245,158,11,0.4); }
      to   { box-shadow: 0 0 0 8px rgba(245,158,11,0); }
    }
    .action-btn.done {
      opacity: 0.3;
      cursor: not-allowed;
      border-color: transparent;
      background: rgba(52,211,153,0.05);
    }
    .action-btn:disabled { cursor: not-allowed; }
    .btn-emoji { font-size: 1.8rem; }
    .btn-text { flex: 1; }
    .btn-sublabel { font-size: 0.72rem; opacity: 0.5; font-weight: 400; margin-top: 2px; }

    /* Weight input */
    .weight-box {
      display: none;
      margin: 0 14px 14px;
      background: rgba(245,158,11,0.1);
      border: 2px solid #f59e0b;
      border-radius: 18px;
      padding: 16px;
    }
    .weight-box.show { display: block; }

    /* Seat options */
    .seat-options {
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 0 14px 14px;
    }
    .seat-options.show { display: flex; }
    .seat-btn {
      padding: 12px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .seat-btn:active { transform: scale(0.96); }

    /* Waiting screen */
    .waiting-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0.6;
    }

    /* Popup */
    .item-popup {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: rgba(52,211,153,0.95);
      color: #1a1a2e;
      padding: 14px 24px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      transition: transform 0.4s;
      z-index: 999;
    }
    .item-popup.show { transform: translateX(-50%) translateY(0); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(239,68,68,0.9);
      color: white; padding: 12px 22px;
      border-radius: 12px; font-size: 0.88rem;
      font-weight: 600; transition: transform 0.3s; z-index: 999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.green { background: rgba(52,211,153,0.9); }

    /* Score tracker */
    .score-bar {
      display: flex;
      gap: 8px;
      padding: 8px 14px;
      flex-wrap: wrap;
    }
    .score-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .score-pill.correct { background: rgba(52,211,153,0.15); border-color: #34d399; }
    .score-pill.wrong   { background: rgba(239,68,68,0.15);  border-color: #ef4444; }
  </style>
</head>
<body>

<header>
  <div class="role-tag">🧑‍💼 CHECK-IN CLERK</div>
  <h2 id="player-name">Clerk</h2>
</header>

<div class="instruction waiting" id="instruction">
  ✈️ Waiting for passenger to arrive...
</div>

<!-- Score bar -->
<div class="score-bar" id="score-bar"></div>

<!-- Waiting -->
<div class="waiting-screen" id="waiting-screen">
  <div style="font-size:4rem">⏳</div>
  <p>Waiting for passenger to join...</p>
</div>

<!-- Main -->
<div id="main-actions" style="display:none; flex-direction:column; flex:1;">

  <p class="section-title">Your Actions — Follow the order!</p>

  <div class="actions">

    <!-- Ask First Name -->
    <button class="action-btn available" id="btn-firstname" onclick="askSpelling('firstName')">
      <span class="btn-emoji">👤</span>
      <div class="btn-text">
        Ask First Name
        <div class="btn-sublabel">"What is your first name?"</div>
      </div>
    </button>

    <!-- Ask Last Name -->
    <button class="action-btn" id="btn-lastname" onclick="askSpelling('lastName')" disabled>
      <span class="btn-emoji">👤</span>
      <div class="btn-text">
        Ask Last Name
        <div class="btn-sublabel">"What is your last name?"</div>
      </div>
    </button>

    <!-- Ask Age -->
    <button class="action-btn" id="btn-age" onclick="askSpelling('age')" disabled>
      <span class="btn-emoji">🎂</span>
      <div class="btn-text">
        Ask Age
        <div class="btn-sublabel">"How old are you?"</div>
      </div>
    </button>

    <!-- Ask Flight Number -->
    <button class="action-btn" id="btn-flightnum" onclick="askSpelling('flightNum')" disabled>
      <span class="btn-emoji">✈️</span>
      <div class="btn-text">
        Ask Flight Number
        <div class="btn-sublabel">"What is your flight number?"</div>
      </div>
    </button>

    <!-- Ask Passport Number -->
    <button class="action-btn" id="btn-passportno" onclick="askSpelling('passportNo')" disabled>
      <span class="btn-emoji">🛂</span>
      <div class="btn-text">
        Ask Passport Number
        <div class="btn-sublabel">"What is your passport number?"</div>
      </div>
    </button>

    <!-- Ask for physical passport -->
    <button class="action-btn" id="btn-passport" onclick="clerkAction('request_passport')" disabled>
      <span class="btn-emoji">📋</span>
      <div class="btn-text">
        Request Passport (Physical)
        <div class="btn-sublabel">"May I see your passport please?"</div>
      </div>
    </button>

    <!-- Passport valid -->
    <button class="action-btn" id="btn-passport-ok" onclick="clerkAction('passport_check_ok')" disabled>
      <span class="btn-emoji">✅</span>
      <div class="btn-text">
        Passport Valid
        <div class="btn-sublabel">"Thank you, everything looks good!"</div>
      </div>
    </button>

    <!-- Ask bags -->
    <button class="action-btn" id="btn-bags" onclick="clerkAction('request_bags')" disabled>
      <span class="btn-emoji">🧳</span>
      <div class="btn-text">
        Ask About Luggage
        <div class="btn-sublabel">"How many bags are you checking in?"</div>
      </div>
    </button>

    <!-- Assign seat -->
    <button class="action-btn" id="btn-seat" onclick="showSeatOptions()" disabled>
      <span class="btn-emoji">💺</span>
      <div class="btn-text">
        Assign Seat
        <div class="btn-sublabel">"What type of seat would you prefer?"</div>
      </div>
    </button>

  </div>

  <!-- Spelling input box -->
  <div class="spelling-box" id="spelling-box">
    <h4 id="spelling-prompt">Type what the passenger says:</h4>
    <div class="spelling-input-row">
      <input id="spelling-input" class="spelling-input" type="text" 
             placeholder="Type answer here..."
             autocomplete="off" autocorrect="off" autocapitalize="off"/>
      <button class="spelling-submit" onclick="submitSpelling()">✓</button>
    </div>
    <div class="spelling-feedback" id="spelling-feedback"></div>
  </div>

  <!-- Weight input -->
  <div class="weight-box" id="weight-box">
    <p style="font-size:0.85rem;opacity:0.7;margin-bottom:10px;text-align:center">
      🧳 Ask passenger: <strong>"How heavy is your bag?"</strong><br>Type the kg they say:
    </p>
    <div style="display:flex;gap:8px;align-items:center">
      <input id="weight-input" type="number" min="1" max="50" placeholder="e.g. 18"
        style="flex:1;padding:12px;border-radius:10px;border:2px solid rgba(255,255,255,0.2);
               background:rgba(255,255,255,0.1);color:white;font-size:1.4rem;font-weight:700;
               text-align:center;outline:none;"/>
      <span style="font-size:1.1rem;opacity:0.6">kg</span>
    </div>
    <button onclick="submitWeight()" style="width:100%;margin-top:10px;padding:12px;
      border-radius:10px;border:none;background:#f59e0b;color:#1a1a2e;
      font-size:1rem;font-weight:700;cursor:pointer;">✅ Confirm Weight</button>
  </div>

  <!-- Seat options -->
  <div class="seat-options" id="seat-options">
    <p class="section-title">Choose seat type:</p>
    <button class="seat-btn" onclick="assignSeat('window')">🪟 Window Seat</button>
    <button class="seat-btn" onclick="assignSeat('aisle')">🚶 Aisle Seat</button>
    <button class="seat-btn" onclick="assignSeat('middle')">💺 Middle Seat</button>
  </div>

</div>

<div class="item-popup" id="item-popup">📥 Item received!</div>
<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  const name = sessionStorage.getItem("playerName") || "Clerk";
  document.getElementById("player-name").textContent = name;

  let checkin = {};
  let phase = "waiting";
  let currentSpellingField = "";
  let scores = { correct: 0, wrong: 0 };

  socket.emit("join_player", { 
    name, 
    savedRole: sessionStorage.getItem("playerRole") 
  });

  socket.on("joined", (data) => {
    if (data.role !== "clerk") {
      window.location.href = "/passenger.html";
    }
  });

  socket.on("state_update", (state) => {
    checkin = state.checkin || {};
    phase = state.phase || "waiting";
    updateUI();
  });

  socket.on("item_received", ({ itemKey, item }) => {
    showPopup(`📥 Received: ${item.emoji} ${item.label}${item.weight ? " (" + item.weight + "kg)" : ""}`);
    updateButtons();
  });

  socket.on("enter_bag_weight", () => {
    document.getElementById("weight-box").classList.add("show");
    showToast("🧳 Ask the passenger how heavy their bag is!", "green");
  });

  socket.on("weight_result", ({ correct, weight, correct_weight, entered }) => {
    if (correct) {
      document.getElementById("weight-box").classList.remove("show");
      showToast(`✅ Correct! ${weight}kg confirmed!`, "green");
    } else {
      showToast(`❌ Wrong! Try again!`, "red");
      document.getElementById("weight-input").value = "";
    }
  });

  socket.on("spelling_result", ({ field, correct, answer, hint }) => {
    const feedback = document.getElementById("spelling-feedback");
    if (correct) {
      scores.correct++;
      feedback.className = "spelling-feedback correct";
      feedback.textContent = `✅ Correct! "${answer}"`;
      document.getElementById("spelling-input").value = "";
      setTimeout(() => {
        document.getElementById("spelling-box").classList.remove("show");
        feedback.className = "spelling-feedback";
        unlockNextButton(field);
      }, 1500);
    } else {
      scores.wrong++;
      feedback.className = "spelling-feedback wrong";
      feedback.textContent = `❌ Wrong spelling! ${hint || "Try again!"}`;
      document.getElementById("spelling-input").value = "";
    }
    updateScoreBar();
  });

  socket.on("game_reset", () => window.location.reload());

  // ── Spelling actions ──
  function askSpelling(field) {
    currentSpellingField = field;
    const actions = {
      firstName:  { action: "ask_firstname",  prompt: "Type the FIRST NAME the passenger says:" },
      lastName:   { action: "ask_lastname",   prompt: "Type the LAST NAME the passenger says:" },
      age:        { action: "ask_age",        prompt: "Type the AGE the passenger says:" },
      flightNum:  { action: "ask_flightnum",  prompt: "Type the FLIGHT NUMBER the passenger says:" },
      passportNo: { action: "ask_passport",   prompt: "Type the PASSPORT NUMBER (spell carefully!):" },
    };
    const a = actions[field];
    if (!a) return;

    clerkAction(a.action);
    document.getElementById("spelling-prompt").textContent = a.prompt;
    document.getElementById("spelling-box").classList.add("show");
    document.getElementById("spelling-input").focus();
    document.getElementById("spelling-feedback").className = "spelling-feedback";

    // Mark button as done
    const btnMap = {
      firstName: "btn-firstname", lastName: "btn-lastname",
      age: "btn-age", flightNum: "btn-flightnum", passportNo: "btn-passportno"
    };
    const btn = document.getElementById(btnMap[field]);
    if (btn) { btn.className = "action-btn done"; btn.disabled = true; }
  }

  function submitSpelling() {
    const answer = document.getElementById("spelling-input").value.trim();
    if (!answer) { showToast("Please type an answer!", "red"); return; }
    
    const checkActions = {
      firstName:  "check_firstname",
      lastName:   "check_lastname",
      age:        "check_age",
      flightNum:  "check_flightnum",
      passportNo: "check_passport",
    };
    clerkAction(checkActions[currentSpellingField], { answer });
  }

  function unlockNextButton(field) {
    const order = ["firstName","lastName","age","flightNum","passportNo","passport"];
    const btnMap = {
      firstName:  "btn-firstname",
      lastName:   "btn-lastname",
      age:        "btn-age",
      flightNum:  "btn-flightnum",
      passportNo: "btn-passportno",
      passport:   "btn-passport",
    };
    const nextMap = {
      firstName:  "lastName",
      lastName:   "age",
      age:        "flightNum",
      flightNum:  "passportNo",
      passportNo: "passport",
    };
    const next = nextMap[field];
    if (next) {
      const nextBtn = document.getElementById(btnMap[next]);
      if (nextBtn) {
        nextBtn.className = "action-btn available";
        nextBtn.disabled = false;
      }
    }
  }

  // ── Clerk actions ──
  function clerkAction(action, data = {}) {
    socket.emit("clerk_action", { action, data });
  }

  function showSeatOptions() {
    document.getElementById("seat-options").classList.add("show");
  }

  function assignSeat(seatType) {
    clerkAction("assign_seat", { seatType });
    document.getElementById("seat-options").classList.remove("show");
  }

  function submitWeight() {
    const weight = parseInt(document.getElementById("weight-input").value);
    if (!weight || weight < 1) { showToast("Enter a valid weight!", "red"); return; }
    socket.emit("clerk_action", { action: "confirm_bag_weight", data: { weight } });
  }

  // ── UI Updates ──
  function updateUI() {
    if (phase === "waiting") {
      document.getElementById("waiting-screen").style.display = "flex";
      document.getElementById("main-actions").style.display = "none";
    } else {
      document.getElementById("waiting-screen").style.display = "none";
      document.getElementById("main-actions").style.display = "flex";
    }
    updateButtons();
    updateInstruction();
  }

  function updateButtons() {
    const ci = checkin;

    // Passport physical button
    if (ci.passportNoCorrect && !ci.passportRequested) {
      setBtn("btn-passport", "available");
    } else if (ci.passportRequested) {
      setBtn("btn-passport", "done");
    }

    // Passport ok button
    if (ci.passportReceived && !ci.passportValid) {
      setBtn("btn-passport-ok", "available");
    } else if (ci.passportValid) {
      setBtn("btn-passport-ok", "done");
    }

    // Bags button
    if (ci.passportValid && !ci.bagsRequested) {
      setBtn("btn-bags", "available");
    } else if (ci.bagsRequested) {
      setBtn("btn-bags", "done");
    }

    // Seat button
    if (ci.bagsConfirmed && !ci.seatAssigned) {
      setBtn("btn-seat", "available");
    } else if (ci.seatAssigned) {
      setBtn("btn-seat", "done");
    }
  }

  function setBtn(id, status) {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.className = "action-btn " + status;
    btn.disabled = (status === "done");
  }

  function updateInstruction() {
    const el = document.getElementById("instruction");
    const ci = checkin;
    if (phase === "waiting") {
      el.className = "instruction waiting";
      el.textContent = "⏳ Waiting for passenger to join...";
    } else if (!ci.firstNameCorrect) {
      el.className = "instruction action";
      el.textContent = "👋 Start by asking the passenger's first name!";
    } else if (!ci.lastNameCorrect) {
      el.className = "instruction action";
      el.textContent = "👤 Ask for their last name!";
    } else if (!ci.ageCorrect) {
      el.className = "instruction action";
      el.textContent = "🎂 Ask how old they are!";
    } else if (!ci.flightCorrect) {
      el.className = "instruction action";
      el.textContent = "✈️ Ask for their flight number!";
    } else if (!ci.passportNoCorrect) {
      el.className = "instruction action";
      el.textContent = "🛂 Ask for their passport number!";
    } else if (!ci.passportRequested) {
      el.className = "instruction action";
      el.textContent = "📋 Ask to see their physical passport!";
    } else if (!ci.passportReceived) {
      el.className = "instruction waiting";
      el.textContent = "⏳ Waiting for passenger to hand over passport...";
    } else if (!ci.passportValid) {
      el.className = "instruction action";
      el.textContent = "🔍 Check the passport and confirm it's valid!";
    } else if (!ci.bagsRequested) {
      el.className = "instruction action";
      el.textContent = "🧳 Ask about their luggage!";
    } else if (!ci.bagsConfirmed) {
      el.className = "instruction waiting";
      el.textContent = "⏳ Waiting for passenger to put bags on belt...";
    } else if (!ci.seatAssigned) {
      el.className = "instruction action";
      el.textContent = "💺 Assign a seat to the passenger!";
    } else {
      el.className = "instruction success";
      el.textContent = "🎉 Check-in complete! Well done!";
    }
  }

  function updateScoreBar() {
    const bar = document.getElementById("score-bar");
    bar.innerHTML = `
      <div class="score-pill correct">✅ ${scores.correct} correct</div>
      <div class="score-pill wrong">❌ ${scores.wrong} wrong</div>
    `;
  }

  // Enter key for spelling
  document.addEventListener("keyup", (e) => {
    if (e.key === "Enter" && document.getElementById("spelling-box").classList.contains("show")) {
      submitSpelling();
    }
  });

  function showPopup(msg) {
    const popup = document.getElementById("item-popup");
    popup.textContent = msg;
    popup.classList.add("show");
    setTimeout(() => popup.classList.remove("show"), 3000);
  }

  function showToast(msg, type = "red") {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.className = "toast show" + (type === "green" ? " green" : "");
    setTimeout(() => { toast.className = "toast" + (type === "green" ? " green" : ""); }, 2500);
  }
</script>
</body>
</html>
