<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>✈️ Passenger</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      font-family:'Segoe UI',sans-serif;
      background:linear-gradient(160deg,#1a1a2e,#16213e,#0f3460);
      min-height:100vh;color:white;display:flex;flex-direction:column;
    }
    header{
      background:rgba(255,255,255,0.07);padding:14px 20px;
      display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid rgba(255,255,255,0.08);
    }
    .role-tag{
      background:#3b82f6;font-size:0.75rem;font-weight:700;
      padding:4px 12px;border-radius:12px;
    }
    .id-card{
      margin:14px;background:linear-gradient(135deg,#1e3a5f,#0a2342);
      border:2px solid rgba(96,208,245,0.4);border-radius:20px;
      padding:18px;box-shadow:0 8px 32px rgba(0,0,0,0.3);
    }
    .id-card-header{
      display:flex;align-items:center;gap:10px;margin-bottom:14px;
      padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.1);
    }
    .id-card-header h3{font-size:0.8rem;text-transform:uppercase;letter-spacing:2px;color:#60d0f5}
    .id-card-header p{font-size:0.7rem;opacity:0.5;margin-top:2px}
    .id-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .id-field{
      background:rgba(255,255,255,0.05);border-radius:12px;padding:10px 12px;
      border:1px solid rgba(255,255,255,0.08);transition:all 0.3s;
    }
    .id-field.asking{
      border-color:#f59e0b;background:rgba(245,158,11,0.15);
      animation:fieldGlow 1.5s infinite alternate;
    }
    .id-field.confirmed{border-color:#34d399;background:rgba(52,211,153,0.1)}
    @keyframes fieldGlow{
      from{box-shadow:0 0 0 0 rgba(245,158,11,0.4)}
      to{box-shadow:0 0 0 8px rgba(245,158,11,0)}
    }
    .field-label{
      font-size:0.65rem;text-transform:uppercase;
      letter-spacing:1px;opacity:0.5;margin-bottom:4px;
    }
    .id-field.asking .field-label::after{content:" ← READ THIS!";color:#f59e0b;font-weight:700}
    .field-value{font-size:1.1rem;font-weight:700;letter-spacing:0.5px}
    .id-field.asking .field-value{color:#f59e0b;font-size:1.3rem}
    .full-width{grid-column:1/-1}
    .instruction{
      margin:0 14px 14px;padding:14px 16px;border-radius:14px;
      font-size:0.9rem;line-height:1.5;text-align:center;font-weight:500;transition:all 0.4s;
    }
    .instruction.waiting{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.7)}
    .instruction.request{
      background:rgba(245,158,11,0.2);border:1px solid #f59e0b;color:#fde68a;
      animation:glow 1.5s infinite alternate;
    }
    .instruction.success{background:rgba(52,211,153,0.15);border:1px solid #34d399;color:#6ee7b7}
    .instruction.complete{background:rgba(139,92,246,0.2);border:1px solid #a78bfa;color:#ddd6fe}
    @keyframes glow{
      from{box-shadow:0 0 8px rgba(245,158,11,0.3)}
      to{box-shadow:0 0 20px rgba(245,158,11,0.6)}
    }
    .section-title{
      padding:4px 16px;font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;opacity:0.4;
    }
    .inventory{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:6px 14px 14px}
    .item-card{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.1);
      border-radius:16px;padding:14px 8px;gap:6px;cursor:pointer;
      transition:all 0.15s;min-height:90px;position:relative;
    }
    .item-card:active:not(.sent):not(.locked){transform:scale(0.93)}
    .item-card.requested{
      border-color:#f59e0b;background:rgba(245,158,11,0.15);
      animation:itemPulse 1s infinite alternate;
    }
    @keyframes itemPulse{
      from{box-shadow:0 0 0 0 rgba(245,158,11,0.4)}
      to{box-shadow:0 0 0 8px rgba(245,158,11,0)}
    }
    .item-card.sent{opacity:0.3;cursor:not-allowed;border-color:transparent}
    .item-card.sent::after{content:"✓ Sent";position:absolute;bottom:4px;font-size:0.65rem;color:#34d399}
    .item-card.in-tray{opacity:0.4;cursor:not-allowed;border-color:#34d399}
    .item-card.in-tray::after{content:"✓ In Tray";position:absolute;bottom:4px;font-size:0.65rem;color:#34d399}
    .item-card.confiscated{opacity:0.3;cursor:not-allowed;border-color:#ef4444}
    .item-card.confiscated::after{content:"🚫";position:absolute;bottom:4px;font-size:0.8rem}
    .item-emoji{font-size:2.2rem}
    .item-label{font-size:0.75rem;font-weight:600;text-align:center}
    .boarding-pass{
      margin:14px;background:linear-gradient(135deg,#1e3a5f,#0a2342);
      border:2px solid #60d0f5;border-radius:20px;padding:20px;display:none;
    }
    .boarding-pass.show{display:block;animation:slideUp 0.5s ease}
    @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
    .bp-row{
      display:flex;justify-content:space-between;padding:8px 0;
      border-bottom:1px dashed rgba(255,255,255,0.1);font-size:0.88rem;
    }
    .bp-label{font-size:0.7rem;color:rgba(255,255,255,0.4);display:block;margin-bottom:2px}
    .barcode{text-align:center;margin-top:12px;font-size:2rem;letter-spacing:-2px;opacity:0.4;font-family:monospace}
    .toast{
      position:fixed;bottom:24px;left:50%;
      transform:translateX(-50%) translateY(80px);
      background:rgba(239,68,68,0.9);color:white;padding:12px 22px;
      border-radius:12px;font-size:0.88rem;font-weight:600;
      transition:transform 0.3s;z-index:999;text-align:center;max-width:300px;
    }
    .toast.show{transform:translateX(-50%) translateY(0)}
    .toast.green{background:rgba(52,211,153,0.9)}

    /* Luggage display */
    .luggage-display{
      display:none;margin:0 14px 14px;
    }
    .bag-info{
      padding:20px;background:rgba(245,158,11,0.15);
      border:2px solid #f59e0b;border-radius:20px;
      text-align:center;margin-bottom:10px;
    }
    .bag-weight-num{font-size:4rem;font-weight:900;color:#f59e0b}

    /* Security section */
    .security-section{display:none}
    .beep-notice{
      margin:0 14px 14px;padding:20px;
      background:rgba(239,68,68,0.2);border:2px solid #ef4444;
      border-radius:20px;text-align:center;display:none;
      animation:dangerPulse 0.5s infinite alternate;
    }
    @keyframes dangerPulse{
      from{box-shadow:0 0 0 0 rgba(239,68,68,0.4)}
      to{box-shadow:0 0 12px rgba(239,68,68,0)}
    }
    .cleared-notice{
      margin:0 14px 14px;padding:20px;
      background:rgba(52,211,153,0.15);border:2px solid #34d399;
      border-radius:20px;text-align:center;display:none;
    }
  </style>
</head>
<body>

<header>
  <div class="role-tag">🧳 PASSENGER</div>
  <h2 id="player-name">Player</h2>
</header>

<!-- Identity Card -->
<div class="id-card" id="id-card" style="display:none">
  <div class="id-card-header">
    <div style="font-size:2rem">🛂</div>
    <div>
      <h3>Your Identity Card</h3>
      <p>Read the highlighted info out loud!</p>
    </div>
  </div>
  <div class="id-fields">
    <div class="id-field" id="field-firstName">
      <div class="field-label">First Name</div>
      <div class="field-value" id="val-firstName">-</div>
    </div>
    <div class="id-field" id="field-lastName">
      <div class="field-label">Last Name</div>
      <div class="field-value" id="val-lastName">-</div>
    </div>
    <div class="id-field" id="field-age">
      <div class="field-label">Age</div>
      <div class="field-value" id="val-age">-</div>
    </div>
    <div class="id-field" id="field-flightNum">
      <div class="field-label">Flight Number</div>
      <div class="field-value" id="val-flightNum">-</div>
    </div>
    <div class="id-field full-width" id="field-passportNo">
      <div class="field-label">Passport Number</div>
      <div class="field-value" id="val-passportNo">-</div>
    </div>
    <div class="id-field full-width" id="field-destination">
      <div class="field-label">Destination</div>
      <div class="field-value" id="val-destination">-</div>
    </div>
  </div>
